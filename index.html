<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Лана & Кирилл · 29.08.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic,latin" rel="stylesheet">
<style>
:root{
  --cream:#F2EEE5;        /* фон, как в приглашении */
  --paper:#FBF9F4;
  --wine:#4B2733;         /* фирменный тёмный цвет текста */
  --wine-soft:#6A4150;
  --gold:#E3A52A;         /* подсолнух */
  --gold-deep:#C98715;
  --terra:#C05E3C;        /* терракота */
  --rose:#C98B86;
  --olive:#6E7A3F;
  --teal:#3E6E7E;
  --mtn:#7C92AD;          /* горы */
  --shadow:0 18px 50px -18px rgba(75,39,51,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--wine);
  background:
     radial-gradient(120% 90% at 50% -10%, #F7F3EA 0%, var(--cream) 55%, #EBE5D6 100%);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.stage{
  height:100dvh; height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:max(14px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom));
}
.book{
  position:relative;
  width:min(440px, 100%);
  height:min(880px, calc(100dvh - 28px));
  height:min(880px, calc(100vh - 28px));
  display:flex; flex-direction:column;
}

/* ---- progress (как сторис) ---- */
.bars{display:flex; gap:6px; padding:2px 4px 12px}
.bar{flex:1; height:4px; border-radius:99px; background:rgba(75,39,51,.18); overflow:hidden}
.bar > i{display:block; height:100%; width:0; border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--terra)); transition:width .35s ease}
.bar.done > i{width:100%}
.bar.active > i{width:100%}

/* ---- viewport / slider ---- */
.frame{position:relative; flex:1; border-radius:22px; overflow:hidden;
  background:#F1ECE1; box-shadow:var(--shadow); touch-action:pan-y}
.track{display:flex; height:100%; transition:transform .42s cubic-bezier(.22,.61,.36,1)}
.slide{min-width:100%; height:100%; position:relative; display:flex; align-items:center; justify-content:center}
.slide img{width:100%; height:100%; object-fit:contain; display:block; user-select:none; -webkit-user-drag:none}

/* tap zones */
.tap{position:absolute; top:0; bottom:0; width:38%; z-index:5; cursor:pointer; -webkit-tap-highlight-color:transparent}
.tap.left{left:0}
.tap.right{right:0}

/* desktop arrows */
.arrow{position:absolute; top:50%; transform:translateY(-50%); z-index:8;
  width:42px;height:42px;border-radius:50%; border:none; cursor:pointer;
  background:rgba(251,249,244,.86); color:var(--wine); backdrop-filter:blur(6px);
  box-shadow:0 6px 18px -6px rgba(75,39,51,.5); display:grid; place-items:center;
  transition:transform .15s ease, opacity .2s ease; font-size:20px}
.arrow:hover{transform:translateY(-50%) scale(1.08)}
.arrow.prev{left:10px}.arrow.next{right:10px}
.arrow[disabled]{opacity:0; pointer-events:none}
@media (hover:none){.arrow{display:none}}

/* hint */
.hint{position:absolute; left:50%; bottom:14px; transform:translateX(-50%); z-index:7;
  font-size:12.5px; letter-spacing:.04em; color:var(--wine-soft);
  background:rgba(251,249,244,.82); padding:6px 12px; border-radius:99px;
  box-shadow:0 4px 14px -6px rgba(75,39,51,.4); display:flex; gap:7px; align-items:center;
  animation:bob 2.4s ease-in-out infinite; pointer-events:none}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.hint.gone{opacity:0; transition:opacity .4s}

/* footer dots + label */
.foot{display:flex; align-items:center; justify-content:center; gap:10px; padding-top:12px; min-height:30px}
.label{font-family:'Caveat',cursive; font-size:20px; color:var(--wine-soft); line-height:1}

/* =================== RSVP SLIDE =================== */
.rsvp{min-width:100%; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative;
  background:
    radial-gradient(80% 50% at 12% 0%, rgba(227,165,42,.16), transparent 60%),
    radial-gradient(70% 45% at 100% 100%, rgba(124,146,173,.20), transparent 60%),
    var(--paper);
  padding:30px 26px 34px; text-align:center}
.rsvp .kicker{font-size:12px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--terra)}
.backlink{position:absolute; top:14px; left:16px; border:none; background:none; cursor:pointer;
  font:inherit; font-size:13px; font-weight:600; color:var(--wine-soft); padding:6px 8px; border-radius:10px}
.backlink:hover{color:var(--wine); background:rgba(75,39,51,.06)}
.rsvp h1{font-family:'Caveat',cursive; font-weight:700; font-size:46px; line-height:.95; margin:6px 0 2px; color:var(--wine)}
.rsvp .sub{font-size:14.5px; line-height:1.5; color:var(--wine-soft); margin:8px auto 4px; max-width:30ch}
.rsvp .when{font-family:'Caveat',cursive; font-size:26px; color:var(--gold-deep); margin:10px 0 18px}
.rsvp .when b{color:var(--wine)}

.field{text-align:left; margin:0 0 14px}
.field label{display:block; font-size:12.5px; font-weight:600; letter-spacing:.02em; color:var(--wine-soft); margin:0 0 6px}
.field .opt{font-weight:400; color:#9a8b86}
.inp{width:100%; font:inherit; font-size:15px; color:var(--wine); background:var(--cream);
  border:1.5px solid rgba(75,39,51,.16); border-radius:14px; padding:12px 14px; outline:none;
  transition:border-color .15s, box-shadow .15s}
.inp::placeholder{color:#b3a59f}
.inp:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(227,165,42,.18)}
textarea.inp{resize:vertical; min-height:64px}

.choices{display:flex; flex-direction:column; gap:10px; margin:2px 0 4px}
.choice{display:flex; align-items:center; gap:12px; width:100%; text-align:left; cursor:pointer;
  font:inherit; font-size:15px; font-weight:600; color:var(--wine);
  background:var(--cream); border:1.6px solid rgba(75,39,51,.14); border-radius:16px;
  padding:14px 16px; transition:transform .12s, border-color .15s, background .15s, box-shadow .15s}
.choice .emoji{font-size:20px; line-height:1; filter:saturate(1.05)}
.choice:hover{transform:translateY(-1px)}
.choice[aria-pressed="true"]{border-color:transparent; color:#fff; box-shadow:0 10px 22px -10px rgba(75,39,51,.55)}
.choice.yes[aria-pressed="true"]{background:linear-gradient(120deg,var(--olive),#5b6733)}
.choice.maybe[aria-pressed="true"]{background:linear-gradient(120deg,var(--gold),var(--gold-deep))}
.choice.no[aria-pressed="true"]{background:linear-gradient(120deg,var(--wine-soft),var(--wine))}
.choice .tick{margin-left:auto; opacity:0; transform:scale(.6); transition:.18s}
.choice[aria-pressed="true"] .tick{opacity:1; transform:scale(1)}

.collapse{max-height:0; overflow:hidden; transition:max-height .35s ease, opacity .3s; opacity:0}
.collapse.show{max-height:140px; opacity:1; margin-top:14px}

.send{margin-top:18px; width:100%; font:inherit; font-size:16px; font-weight:700; letter-spacing:.01em;
  color:#fff; border:none; border-radius:16px; padding:15px 18px; cursor:pointer;
  background:linear-gradient(120deg,var(--terra),#a84a2c);
  box-shadow:0 14px 28px -12px rgba(192,94,60,.8); transition:transform .12s, box-shadow .15s, opacity .2s}
.send:hover{transform:translateY(-1px)}
.send:active{transform:translateY(0)}
.send[disabled]{opacity:.45; cursor:not-allowed; box-shadow:none; transform:none}
.err{color:#b23b2e; font-size:13px; min-height:18px; margin-top:8px; font-weight:500}

.muted{font-size:11.5px; color:#a89a93; margin-top:14px; line-height:1.4}

/* success */
.done-screen{display:none; padding:8px 4px 10px}
.done-screen.show{display:block; animation:rise .5s ease both}
@keyframes rise{from{opacity:0; transform:translateY(14px)}to{opacity:1; transform:translateY(0)}}
.summit{width:120px; height:120px; margin:6px auto 4px; display:block}
.done-screen h2{font-family:'Caveat',cursive; font-weight:700; font-size:40px; margin:6px 0 4px; color:var(--wine)}
.done-screen p{font-size:14.5px; color:var(--wine-soft); line-height:1.55; max-width:30ch; margin:0 auto}
.share{display:flex; flex-direction:column; gap:9px; margin:18px 0 0}
.share a, .share button{font:inherit; font-size:14.5px; font-weight:600; cursor:pointer;
  border-radius:14px; padding:12px 14px; text-decoration:none; border:1.6px solid rgba(75,39,51,.16);
  color:var(--wine); background:var(--cream); transition:transform .12s, border-color .15s; display:flex; align-items:center; justify-content:center; gap:9px}
.share a:hover, .share button:hover{transform:translateY(-1px); border-color:var(--gold)}
.again{margin-top:14px; background:none; border:none; color:var(--wine-soft); font:inherit; font-size:13px; text-decoration:underline; cursor:pointer}

/* petals */
.petal{position:fixed; top:-30px; z-index:50; font-size:20px; pointer-events:none; will-change:transform,opacity}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important; transition:none!important}
}
</style>
</head>

    <div class="collapse" id="guestsWrap">
      <div class="field" style="margin:0">
        <label for="guests">Сколько вас будет человек?</label>
        <input class="inp" id="guests" type="number" min="1" max="20" inputmode="numeric" placeholder="1">
      </div>
    </div>

    <div class="field" style="margin-top:14px">
      <label for="comment">Пожелания или комментарий <span class="opt">(необязательно)</span></label>
      <textarea class="inp" id="comment" placeholder="Аллергии, +1, тёплые слова…"></textarea>
    </div>

    <button class="send" id="send" disabled>Отправить ответ</button>
    <div class="err" id="err"></div>
    <div class="muted">Спасибо, что будете частью этого дня. До встречи в горах настроения!</div>
  </div>

  <div class="done-screen" id="done">
    <svg class="summit" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M6 104 L44 36 L62 70 L80 24 L114 104 Z" fill="#7C92AD"/>
      <path d="M44 36 L33 56 L55 56 Z" fill="#FBF9F4"/>
      <path d="M80 24 L70 44 L92 44 Z" fill="#FBF9F4"/>
      <path d="M80 24 V8" stroke="#4B2733" stroke-width="3" stroke-linecap="round"/>
      <path d="M80 9 L98 14 L80 20 Z" fill="#C05E3C"/>
    </svg>
    <h2 id="doneTitle">Ура, записали!</h2>
    <p id="doneMsg"></p>
    <div class="share" id="share"></div>
    <button class="again" id="again">← изменить ответ</button>
  </div>
`;
track.appendChild(rsvp);

/* ---------- progress bars ---------- */
const N = SLIDES.length + 1;
const bars=document.getElementById('bars');
for(let i=0;i<N;i++){const b=document.createElement('div'); b.className='bar'; b.innerHTML='<i></i>'; bars.appendChild(b);}
const barEls=[...bars.children];

/* ---------- navigation ---------- */
let idx=0;
const labelEl=document.getElementById('label');
const prevBtn=document.getElementById('prev'), nextBtn=document.getElementById('next');
const hint=document.getElementById('hint');

function render(){
  track.style.transform=`translateX(${-idx*100}%)`;
  barEls.forEach((b,i)=>{b.classList.toggle('active',i===idx); b.classList.toggle('done',i<idx);});
  prevBtn.disabled = idx===0;
  nextBtn.disabled = idx===N-1;
  const onForm = idx===SLIDES.length;
  document.getElementById('tapL').style.pointerEvents = onForm ? 'none':'auto';
  document.getElementById('tapR').style.pointerEvents = onForm ? 'none':'auto';
  prevBtn.style.display = onForm ? 'none':'';
  nextBtn.style.display = onForm ? 'none':'';
  labelEl.textContent = idx < SLIDES.length ? labels[idx] : 'Подтверждение присутствия';
}
function go(n){ idx=Math.max(0,Math.min(N-1,n)); render(); }
function next(){ if(idx<N-1) go(idx+1); }
function prev(){ if(idx>0) go(idx-1); }

document.getElementById('tapR').addEventListener('click',()=>{dismissHint();next();});
document.getElementById('tapL').addEventListener('click',()=>{dismissHint();prev();});
nextBtn.addEventListener('click',()=>{dismissHint();next();});
prevBtn.addEventListener('click',()=>{dismissHint();prev();});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){dismissHint();next();}
  if(e.key==='ArrowLeft'){dismissHint();prev();}
});

function dismissHint(){ if(hint && !hint.classList.contains('gone')){hint.classList.add('gone'); setTimeout(()=>hint.remove(),450);} }
setTimeout(dismissHint, 6000);

/* swipe */
const frame=document.getElementById('frame');
let sx=0, sy=0, dragging=false;
frame.addEventListener('touchstart',e=>{sx=e.touches[0].clientX; sy=e.touches[0].clientY; dragging=true;},{passive:true});
frame.addEventListener('touchend',e=>{
  if(!dragging) return; dragging=false;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)){ dismissHint(); dx<0?next():prev(); }
},{passive:true});

render();

/* ============================================================
   RSVP logic
   ============================================================ */
const choices=[...document.querySelectorAll('.choice')];
const nameI=document.getElementById('name');
const guestsWrap=document.getElementById('guestsWrap');
const guestsI=document.getElementById('guests');
const commentI=document.getElementById('comment');
const sendBtn=document.getElementById('send');
const errEl=document.getElementById('err');
let status=null;

choices.forEach(c=>c.addEventListener('click',()=>{
  status=c.dataset.v;
  choices.forEach(x=>x.setAttribute('aria-pressed', x===c ? 'true':'false'));
  const showGuests = status==='yes' || status==='maybe';
  guestsWrap.classList.toggle('show', showGuests);
  if(showGuests && !guestsI.value) guestsI.value=1;
  validate();
}));
[nameI,guestsI,commentI].forEach(el=>el.addEventListener('input',validate));
function validate(){ sendBtn.disabled = !(status && nameI.value.trim().length>=2); }

sendBtn.addEventListener('click', submit);

function submit(){
  if(sendBtn.disabled) return;
  errEl.textContent='';
  const data={
    name:nameI.value.trim(),
    status,
    statusText:STATUS_LABEL[status],
    guests:(status==='no')?'':(guestsI.value||'1'),
    comment:commentI.value.trim()
  };
  sendBtn.disabled=true; sendBtn.textContent='Отправляем…';

  if(RSVP.googleFormUrl && RSVP.entryName){
    sendToGoogle(data).finally(()=>showSuccess(data));
  } else {
    setTimeout(()=>showSuccess(data),350);
  }
}

function sendToGoogle(d){
  const fd=new FormData();
  if(RSVP.entryName)    fd.append(RSVP.entryName, d.name);
  if(RSVP.entryStatus)  fd.append(RSVP.entryStatus, d.statusText);
  if(RSVP.entryGuests)  fd.append(RSVP.entryGuests, d.guests);
  if(RSVP.entryComment) fd.append(RSVP.entryComment, d.comment);
  return fetch(RSVP.googleFormUrl,{method:'POST',mode:'no-cors',body:fd}).catch(()=>{});
}

function showSuccess(d){
  document.getElementById('form-view').style.display='none';
  const done=document.getElementById('done'); done.classList.add('show');
  const title=document.getElementById('doneTitle'), msg=document.getElementById('doneMsg');
  if(d.status==='yes'){ title.textContent='Ждём вас на вершине!'; msg.textContent='Ваш ответ записан. 29 августа — наш день, и вы будете рядом 💛'; petals(); }
  else if(d.status==='maybe'){ title.textContent='Поняли, держим место!'; msg.textContent='Будем надеяться, что всё сложится. Дайте знать, как определитесь 🤞'; }
  else { title.textContent='Спасибо, что сказали'; msg.textContent='Жаль, что не получится. Будем мысленно с вами — и обнимем при встрече 🤍'; }

  // share buttons
  const share=document.getElementById('share'); share.innerHTML='';
  const text=`RSVP · свадьба Ланы и Кирилла 29.08.2026\nИмя: ${d.name}\nОтвет: ${d.statusText}`+
             (d.guests?`\nКол-во: ${d.guests}`:'')+(d.comment?`\nКомментарий: ${d.comment}`:'');
  if(RSVP.telegram){ const a=document.createElement('a');
    a.href=`https://t.me/${RSVP.telegram}?text=${encodeURIComponent(text)}`; a.target='_blank';
    a.innerHTML='✈️ Сообщить в Telegram'; share.appendChild(a); }
  if(RSVP.whatsapp){ const a=document.createElement('a');
    a.href=`https://wa.me/${RSVP.whatsapp}?text=${encodeURIComponent(text)}`; a.target='_blank';
    a.innerHTML='💬 Сообщить в WhatsApp'; share.appendChild(a); }
  const copy=document.createElement('button');
  copy.innerHTML='📋 Скопировать мой ответ';
  copy.addEventListener('click',()=>{ navigator.clipboard?.writeText(text).then(()=>{copy.innerHTML='✓ Скопировано';}).catch(()=>{}); });
  share.appendChild(copy);
}

document.getElementById('backToPages').addEventListener('click',()=>{ go(SLIDES.length-1); });

document.getElementById('again').addEventListener('click',()=>{
  document.getElementById('done').classList.remove('show');
  document.getElementById('form-view').style.display='';
  sendBtn.disabled=false; sendBtn.textContent='Отправить ответ'; validate();
});

/* petals celebration */
function petals(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const glyphs=['🌻','🌼','✨','🏔️'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='petal'; p.textContent=glyphs[i%glyphs.length];
    p.style.left=Math.random()*100+'vw';
    const dur=2.6+Math.random()*2, delay=Math.random()*0.6, drift=(Math.random()*2-1)*120;
    p.style.fontSize=(14+Math.random()*16)+'px';
    p.animate([
      {transform:`translate(0,-30px) rotate(0deg)`,opacity:1},
      {transform:`translate(${drift}px, 105vh) rotate(${Math.random()*720-360}deg)`,opacity:0}
    ],{duration:dur*1000, delay:delay*1000, easing:'cubic-bezier(.3,.1,.4,1)'});
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(dur+delay)*1000+200);
  }
}
</script>
</body>
